<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>棋譜メーカー — スクショ・KIFをA4棋譜に</title>
<meta name="description" content="将棋の棋譜スクショやKIFファイルを、印刷・保存できるA4の棋譜用紙に清書するアプリ。">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#131F28">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="棋譜メーカー">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sumi:#131F28;        /* 藍墨：背景 */
    --tetsu:#1D3242;       /* 鉄紺：パネル */
    --tetsu-2:#25404F;     /* パネル明 */
    --kami:#FBFAF5;        /* 紙 */
    --shu:#C73E3A;         /* 朱 */
    --shu-dark:#A93330;
    --gin:#9FB3BE;         /* 銀鼠：補助文字 */
    --line:#33505F;
    --ink:#1A1A18;         /* 棋譜の墨 */
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--sumi);
    color:#E8EDEF;
    font-family:"Zen Kaku Gothic New",system-ui,sans-serif;
    min-height:100vh;
  }
  header.app{
    padding:20px 18px 14px;
    border-bottom:1px solid var(--line);
    display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;
  }
  header.app h1{
    font-family:"Shippori Mincho",serif;
    font-size:1.5rem;letter-spacing:.35em;font-weight:700;
  }
  header.app h1 .shu{color:var(--shu);}
  header.app p{color:var(--gin);font-size:.78rem;letter-spacing:.05em;}
  main{max-width:900px;margin:0 auto;padding:16px 14px 60px;}

  section.panel{
    background:var(--tetsu);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px;
    margin-top:16px;
  }
  .panel h2{
    font-size:.8rem;font-weight:700;letter-spacing:.25em;color:var(--gin);
    margin-bottom:12px;
  }
  .panel h2 b{color:var(--shu);font-family:"Shippori Mincho",serif;margin-right:8px;font-size:.95rem;}

  /* --- 画像アップロード --- */
  .drop{
    border:1.5px dashed var(--line);
    border-radius:8px;
    padding:22px 14px;
    text-align:center;color:var(--gin);
    cursor:pointer;font-size:.9rem;
    transition:border-color .15s,background .15s;
  }
  .drop:hover,.drop:focus-visible{border-color:var(--shu);background:var(--tetsu-2);outline:none;}
  .drop strong{color:#E8EDEF;display:block;margin-bottom:4px;font-size:1rem;}
  #fileInput,#kifInput{display:none;}
  .orline{display:flex;align-items:center;gap:12px;color:var(--gin);font-size:.75rem;letter-spacing:.2em;margin:16px 0 2px;}
  .orline::before,.orline::after{content:"";flex:1;border-top:1px solid var(--line);}
  .thumbs{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
  .thumb{
    position:relative;width:84px;height:84px;border-radius:6px;overflow:hidden;
    border:1px solid var(--line);background:#000;
  }
  .thumb img{width:100%;height:100%;object-fit:cover;opacity:.9;}
  .thumb .ord{
    position:absolute;left:4px;top:4px;background:var(--shu);color:#fff;
    font-size:.7rem;font-weight:700;border-radius:4px;padding:1px 6px;
  }
  .thumb button{
    position:absolute;right:3px;top:3px;width:20px;height:20px;border:none;border-radius:50%;
    background:rgba(0,0,0,.65);color:#fff;cursor:pointer;font-size:.75rem;line-height:1;
  }
  .hint{color:var(--gin);font-size:.75rem;margin-top:10px;line-height:1.6;}

  /* --- ボタン --- */
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    border:none;border-radius:8px;cursor:pointer;
    font-family:inherit;font-weight:700;font-size:.95rem;
    padding:12px 22px;letter-spacing:.1em;
    transition:transform .1s,background .15s;
  }
  .btn:active{transform:translateY(1px);}
  .btn:focus-visible{outline:2px solid #fff;outline-offset:2px;}
  .btn-shu{background:var(--shu);color:#fff;}
  .btn-shu:hover{background:var(--shu-dark);}
  .btn-ghost{background:transparent;color:var(--gin);border:1px solid var(--line);}
  .btn-ghost:hover{color:#fff;border-color:var(--gin);}
  .btn[disabled]{opacity:.45;cursor:not-allowed;}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}

  .status{margin-top:12px;font-size:.85rem;min-height:1.4em;color:var(--gin);}
  .status.err{color:#FF9B94;}
  .status.ok{color:#9FD8A8;}
  @keyframes pulse{50%{opacity:.35}}
  .status.busy{animation:pulse 1.2s infinite;}

  /* --- 対局情報・指し手編集 --- */
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .fields label{font-size:.72rem;color:var(--gin);display:block;letter-spacing:.15em;margin-bottom:4px;}
  .fields input,textarea#movesBox{
    width:100%;background:var(--sumi);border:1px solid var(--line);
    border-radius:6px;color:#E8EDEF;padding:9px 10px;
    font-family:inherit;font-size:.95rem;
  }
  .fields input:focus,textarea#movesBox:focus{outline:none;border-color:var(--shu);}
  textarea#movesBox{
    margin-top:10px;min-height:150px;resize:vertical;
    font-family:"Shippori Mincho",serif;line-height:1.9;letter-spacing:.05em;
  }

  /* --- 保存案内バッジ --- */
  .savebadge{
    display:flex;align-items:center;gap:10px;
    background:var(--tetsu-2);border:1px solid var(--line);
    border-radius:8px;padding:10px 14px;margin-bottom:14px;
    font-size:.85rem;line-height:1.6;
  }
  .savebadge b{color:var(--shu);font-size:1.1rem;flex-shrink:0;}

  /* --- 画像プレビュー --- */
  #imgPreview img{
    display:block;width:100%;
    border-radius:6px;border:1px solid var(--line);
    margin:6px 0 16px;
    background:#fff;
  }
  #imgPreview .pcap{
    color:var(--gin);font-size:.72rem;letter-spacing:.15em;
  }
  .empty-note{color:var(--gin);font-size:.85rem;text-align:center;padding:26px 0;}

  /* --- 描画用の隠しステージ（A4原寸のまま画面外に置く） --- */
  #renderStage{
    position:fixed;left:-12000px;top:0;
    width:230mm;pointer-events:none;
  }
  .sheet{
    width:210mm;min-height:297mm;
    background:#FDFCF7;color:var(--ink);
    font-family:"Shippori Mincho",serif;
    padding:15mm 15mm 11mm;
    margin:0 0 10mm;
    position:relative;
  }
  /* 外枠：上品な二重罫 */
  .frame{
    position:relative;
    border:1.4px solid #2B2A26;
    padding:7mm 11mm 8mm;
  }
  .frame::before{
    content:"";position:absolute;inset:1.8mm;
    border:0.5px solid #A7A395;pointer-events:none;
  }
  /* 表題 */
  .kdo-title{
    text-align:center;margin-bottom:6mm;
  }
  .kdo-title h3{
    font-size:15pt;font-weight:700;
    letter-spacing:1em;text-indent:1em;margin-bottom:2.5mm;
  }
  .kdo-title h3.long{
    font-size:13.5pt;letter-spacing:.25em;text-indent:.25em;
  }
  .kdo-title .tline{
    width:22mm;height:0;margin:0 auto;
    border-top:0.8px solid #6B6A62;
  }
  /* 対局者 */
  .players{
    display:flex;justify-content:center;align-items:baseline;
    gap:14mm;margin-bottom:2.5mm;
  }
  .players .p{font-size:12.5pt;letter-spacing:.05em;}
  .players .p em{
    font-style:normal;font-size:7.5pt;color:#807D72;
    letter-spacing:.25em;margin-right:2.5mm;
    font-family:"Zen Kaku Gothic New",sans-serif;
  }
  .players .vs{font-size:8pt;color:#A7A395;}
  .subinfo{
    text-align:center;font-size:8.5pt;color:#6B6A62;
    letter-spacing:.12em;margin-bottom:5mm;
    font-family:"Zen Kaku Gothic New",sans-serif;
  }
  .subinfo span{margin:0 3mm;}
  /* 指し手：4列＋列間の細罫 */
  .cols{display:flex;}
  .col{flex:1;min-width:0;padding:0 4mm;}
  .col.has + .col.has{border-left:0.5px solid #D8D4C6;}
  .mv{
    display:flex;font-size:var(--mv,11.5pt);line-height:1.5;
    border-bottom:0.5px dotted #C9C4B4;
    white-space:nowrap;
  }
  .mv .no{
    width:2.4em;text-align:right;padding-right:.6em;
    color:#9A968A;font-size:8pt;font-family:"Zen Kaku Gothic New",sans-serif;
    flex-shrink:0;align-self:center;
  }
  .mv .te{letter-spacing:.1em;}
  .mv .sen{color:#1A1A18;}
  .mv .go{color:#3A3A34;}
  .sheet .stamp{
    position:absolute;right:12mm;bottom:4mm;
    width:24mm;text-align:center;
  }
  .sheet .stamp img{width:23mm;height:auto;display:block;margin:0 auto;}
  .sheet .stamp i{
    display:block;font-style:normal;font-size:6.5pt;color:#8A8574;
    letter-spacing:.15em;margin-top:1mm;white-space:nowrap;
    font-family:"Zen Kaku Gothic New",sans-serif;font-weight:700;
  }
  .sheet .pageno{
    position:absolute;left:15mm;bottom:8mm;
    font-size:8pt;color:#9A968A;letter-spacing:.1em;
    font-family:"Zen Kaku Gothic New",sans-serif;
  }
  @media (prefers-reduced-motion:reduce){
    .status.busy{animation:none;}
  }
</style>
</head>
<body>

<header class="app">
  <h1>棋<span class="shu">譜</span>メーカー</h1>
  <p>スクショもKIFファイルも、保存できるA4棋譜に。</p>
</header>

<main>

  <section class="panel">
    <h2><b>一</b>棋譜を追加（スクショ / KIF）</h2>
    <div class="drop" id="dropZone" role="button" tabindex="0" aria-label="画像を追加">
      <strong>タップして画像を選ぶ</strong>
      対局の最初から順に追加してください（複数可）
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div class="thumbs" id="thumbs"></div>
    <p class="hint">将棋ウォーズ・ぴよ将棋・81道場などの棋譜画面のスクショに対応。番号＝読み取り順です。</p>
    <div class="actions">
      <button class="btn btn-shu" id="readBtn" disabled>読み取る</button>
      <button class="btn btn-ghost" id="clearBtn">画像を消す</button>
    </div>
    <div class="orline"><span>または</span></div>
    <div class="actions" style="margin-top:12px;">
      <button class="btn btn-ghost" id="kifBtn" type="button">KIFファイルを開く</button>
    </div>
    <input type="file" id="kifInput">
    <p class="status" id="status"></p>
  </section>

  <section class="panel" id="editPanel" hidden>
    <h2><b>二</b>読み取り結果を直す</h2>
    <div class="fields">
      <div style="grid-column:1/-1"><label for="fTitle">大会名・タイトル（空欄なら「棋譜」と表示）</label><input id="fTitle" placeholder="例：第３回 かくがわり杯"></div>
      <div><label for="fSente">先手</label><input id="fSente" placeholder="先手の名前"></div>
      <div><label for="fGote">後手</label><input id="fGote" placeholder="後手の名前"></div>
      <div><label for="fDate">対局日</label><input id="fDate" placeholder="2026年7月3日"></div>
      <div><label for="fResult">結果</label><input id="fResult" placeholder="◯手まで先手の勝ち"></div>
    </div>
    <textarea id="movesBox" spellcheck="false"
      placeholder="１行に１手ずつ（例：７六歩）。▲△は自動で付きます。"></textarea>
    <p class="hint">読み間違いがあればここで直せます。直すとすぐ下のA4に反映されます。</p>
  </section>

  <section class="panel">
    <h2><b>三</b>A4棋譜（長押しで保存）</h2>
    <div class="savebadge">
      <b>四</b>
      <span>下の棋譜を<strong>長押し</strong> → 「<strong>"ファイル"に保存</strong>」 → <strong>棋譜ファイル</strong>フォルダを選んで保存してください。</span>
    </div>
    <p class="status" id="previewNote" style="margin:0 0 8px;"></p>
    <div id="imgPreview"><p class="empty-note">スクショの読み取り、またはKIFの読み込みでここにA4の棋譜が表示されます</p></div>
  </section>

</main>

<!-- A4描画用の隠しステージ -->
<div id="renderStage" aria-hidden="true"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
(function(){
  "use strict";

  /* ---------- 状態（すべてメモリ上） ---------- */
  var images = [];          // {b64, mediaType, url}
  var game = { sente:"", gote:"", date:"", result:"", title:"", moves:[] };

  var $ = function(id){ return document.getElementById(id); };
  var dropZone=$("dropZone"), fileInput=$("fileInput"), thumbs=$("thumbs"),
      readBtn=$("readBtn"), clearBtn=$("clearBtn"), statusEl=$("status"),
      editPanel=$("editPanel"), movesBox=$("movesBox"),
      renderStage=$("renderStage"), imgPreview=$("imgPreview"), previewNote=$("previewNote");

  /* ---------- 画像追加 ---------- */
  dropZone.addEventListener("click", function(){ fileInput.click(); });
  dropZone.addEventListener("keydown", function(e){
    if(e.key==="Enter"||e.key===" "){ e.preventDefault(); fileInput.click(); }
  });
  fileInput.addEventListener("change", function(){
    var files = Array.prototype.slice.call(fileInput.files);
    var done = 0;
    files.forEach(function(f){
      var r = new FileReader();
      r.onload = function(){
        var b64 = String(r.result).split(",")[1];
        images.push({ b64:b64, mediaType:f.type||"image/png", url:String(r.result) });
        done++;
        if(done===files.length){ renderThumbs(); }
      };
      r.readAsDataURL(f);
    });
    fileInput.value = "";
  });

  function renderThumbs(){
    thumbs.innerHTML = "";
    images.forEach(function(img,i){
      var d=document.createElement("div"); d.className="thumb";
      d.innerHTML='<img alt="棋譜画像'+(i+1)+'"><span class="ord">'+(i+1)+
                  '</span><button type="button" aria-label="この画像を削除">×</button>';
      d.querySelector("img").src = img.url;
      d.querySelector("button").addEventListener("click", function(){
        images.splice(i,1); renderThumbs();
      });
      thumbs.appendChild(d);
    });
    readBtn.disabled = images.length===0;
  }

  clearBtn.addEventListener("click", function(){
    images=[]; renderThumbs(); setStatus("","");
  });

  function setStatus(msg, kind){
    statusEl.textContent = msg;
    statusEl.className = "status" + (kind ? " "+kind : "");
  }
  function setNote(msg, kind){
    previewNote.textContent = msg;
    previewNote.className = "status" + (kind ? " "+kind : "");
  }

  /* ---------- KIFファイル読み込み ---------- */
  var kifBtn=$("kifBtn"), kifInput=$("kifInput");
  kifBtn.addEventListener("click", function(){ kifInput.click(); });
  kifInput.addEventListener("change", function(){
    var f=kifInput.files[0];
    if(f){ readKifFile(f); }
    kifInput.value="";
  });

  function readKifFile(f){
    // まずUTF-8で読み、文字化け（U+FFFD）があればShift_JISで読み直す
    var r=new FileReader();
    r.onload=function(){
      var text=String(r.result);
      if(text.indexOf("\uFFFD")!==-1){
        var r2=new FileReader();
        r2.onload=function(){ applyKif(String(r2.result), f.name); };
        r2.onerror=function(){ setStatus("ファイルを読めませんでした。","err"); };
        r2.readAsText(f,"shift-jis");
      }else{
        applyKif(text, f.name);
      }
    };
    r.onerror=function(){ setStatus("ファイルを読めませんでした。","err"); };
    r.readAsText(f,"utf-8");
  }

  function applyKif(text, name){
    try{
      var g=parseKif(text);
      if(!g.moves.length){ throw new Error("指し手が見つかりません。KIF形式の棋譜ファイルか確認してください"); }
      game.sente=g.sente; game.gote=g.gote;
      game.date=g.date;   game.result=g.result;
      game.title=g.title||game.title;
      game.moves=g.moves;
      $("fTitle").value=game.title;
      $("fSente").value=game.sente; $("fGote").value=game.gote;
      $("fDate").value=game.date;   $("fResult").value=game.result;
      movesBox.value=game.moves.join("\n");
      editPanel.hidden=false;
      renderSheets();
      setStatus("「"+name+"」から"+game.moves.length+"手を読み込みました。","ok");
      editPanel.scrollIntoView({behavior:"smooth"});
    }catch(err){
      console.error(err);
      setStatus("KIFの読み込みに失敗しました："+err.message,"err");
    }
  }

  function parseKif(text){
    var g={sente:"",gote:"",date:"",result:"",title:"",moves:[]};
    var terminals=["投了","中断","千日手","詰み","持将棋","切れ負け","反則勝ち","反則負け","入玉宣言"];
    var lines=text.split(/\r?\n/);
    for(var i=0;i<lines.length;i++){
      var line=lines[i];
      if(!line.trim()) continue;
      if(/^[#＃*＊]/.test(line.trim())) continue;      // コメント行
      if(/^変化：/.test(line.trim())) break;            // 変化以降は本譜でないため無視
      var m;
      if((m=line.match(/^棋戦：(.*)$/)))            { g.title=m[1].trim(); continue; }
      if((m=line.match(/^先手：(.*)$/)))            { g.sente=m[1].trim(); continue; }
      if((m=line.match(/^後手：(.*)$/)))            { g.gote =m[1].trim(); continue; }
      if((m=line.match(/^(?:開始日時|対局日)：(.*)$/))){ if(!g.date) g.date=m[1].trim(); continue; }
      if((m=line.match(/^まで(.*)$/)))              { g.result="まで"+m[1].trim(); continue; }
      // 指し手行： "  12 ３四歩(33)   ( 0:02/00:00:05)" など
      m=line.match(/^\s*(\d+)\s+(.+)$/);
      if(!m) continue;
      var mv=m[2];
      mv=mv.replace(/\(\s*\d+:\d+.*$/,"");   // 消費時間部分を除去
      mv=mv.replace(/\(\d+\)/g,"");           // 移動元 (77) を除去
      mv=mv.trim();
      if(!mv) continue;
      var isTerminal=terminals.some(function(t){ return mv.indexOf(t)===0; });
      if(isTerminal){
        if(!g.result){ g.result=g.moves.length+"手 "+mv; }
        continue;                              // 投了等は指し手として載せない
      }
      g.moves.push(mv);
    }
    return g;
  }

  /* ---------- AI読み取り ---------- */
  readBtn.addEventListener("click", function(){
    readMoves();
  });

  async function readMoves(){
    readBtn.disabled = true;
    setStatus("読み取り中…（画像"+images.length+"枚）","busy");
    try{
      var content = images.map(function(img){
        return { type:"image",
                 source:{ type:"base64", media_type:img.mediaType, data:img.b64 } };
      });
      content.push({ type:"text", text:
        "これらの画像は将棋の棋譜（対局記録）のスクリーンショットです。画像の順番どおりに、初手から最後まで指し手を読み取ってください。\n"+
        "次のJSONだけを出力してください。前置き・説明・コードフェンスは一切禁止です。\n"+
        '{"sente":"先手名","gote":"後手名","date":"対局日","result":"結果（例：85手まで先手の勝ち）","moves":["７六歩","３四歩","２六歩","同　歩","４五桂打","８八角成", "..."]}\n'+
        "ルール：\n"+
        "・movesの各要素に▲△や手数の番号は付けない\n"+
        "・数字は「７六」のように筋を全角数字、段を漢数字で書く\n"+
        "・「同」の手は「同　歩」のように書く。成りは「８八角成」、不成は「４四銀不成」、打つ手は「４五桂打」のように書く\n"+
        "・読み取れない項目は空文字列にする\n"+
        "・画像に重複する手が写っている場合は一度だけ数える\n"+
        "・確信が持てず推測した手があれば、その手数を result とは別に \"unsure\":[手数,…] として含める（無ければ省略可）"
      });

      var res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:1000,
          messages:[{ role:"user", content:content }]
        })
      });
      var data = await res.json();
      if(!data || !data.content){ throw new Error("応答が空でした"); }
      var text = data.content.map(function(b){ return b.type==="text"?b.text:""; }).join("");
      text = text.replace(/```json|```/g,"").trim();
      var first = text.indexOf("{"), last = text.lastIndexOf("}");
      if(first===-1||last===-1){ throw new Error("JSONを取り出せませんでした"); }
      var parsed = JSON.parse(text.slice(first,last+1));

      game.sente  = parsed.sente  || "";
      game.gote   = parsed.gote   || "";
      game.date   = parsed.date   || "";
      game.result = parsed.result || "";
      game.moves  = Array.isArray(parsed.moves) ? parsed.moves.filter(Boolean) : [];

      $("fTitle").value=game.title;
      $("fSente").value=game.sente; $("fGote").value=game.gote;
      $("fDate").value=game.date;   $("fResult").value=game.result;
      movesBox.value = game.moves.join("\n");
      editPanel.hidden = false;
      renderSheets();

      var msg = game.moves.length+"手を読み取りました。";
      if(parsed.unsure && parsed.unsure.length){
        msg += " 自信のない手："+parsed.unsure.join("・")+"手目。確認してください。";
      }
      setStatus(msg,"ok");
      editPanel.scrollIntoView({behavior:"smooth"});
    }catch(err){
      console.error(err);
      setStatus("読み取りに失敗しました："+err.message+"　もう一度試すか、画像を減らしてみてください。","err");
    }finally{
      readBtn.disabled = images.length===0;
    }
  }

  /* ---------- 編集 → 反映 ---------- */
  ["fTitle","fSente","fGote","fDate","fResult"].forEach(function(id){
    $(id).addEventListener("input", function(){
      game.title=$("fTitle").value;
      game.sente=$("fSente").value; game.gote=$("fGote").value;
      game.date=$("fDate").value;   game.result=$("fResult").value;
      renderSheets();
    });
  });
  movesBox.addEventListener("input", function(){
    game.moves = movesBox.value.split(/\n+/).map(function(l){
      return l.replace(/^\s*\d+[\.．\s]*/,"").replace(/^[▲△☗☖]\s*/,"").trim();
    }).filter(Boolean);
    renderSheets();
  });

  function esc(s){
    return String(s).replace(/[&<>"']/g,function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  function renderSheets(){
    if(!game.moves.length){
      renderStage.innerHTML="";
      imgPreview.innerHTML='<p class="empty-note">スクショの読み取り、またはKIFの読み込みでここにA4の棋譜が表示されます</p>';
      setNote("","");
      return;
    }
    var m=game.moves.length;
    // 基本：30行×4列(120手)。121手以上は5列目を追加。
    // それでも収まらない長手数は行数を増やし、文字を自動で縮めて必ず1枚に収める。
    var cols = (m<=120) ? 4 : 5;
    var rows = Math.max(30, Math.ceil(m/cols));
    var scale = Math.min(1, 30/rows);
    var fs = Math.max(7.5, 11.5*scale);   // 指し手の文字サイズ(pt)

    var colsHtml="";
    for(var c=0;c<cols;c++){
      var cell="";
      for(var r0=0;r0<rows;r0++){
        var idx=c*rows+r0;
        if(idx>=m) break;
        var n=idx+1;
        var isSente=(n%2===1);
        var mark=isSente?"▲":"△";
        cell+='<div class="mv"><span class="no">'+n+'</span><span class="te '+
              (isSente?"sen":"go")+'">'+mark+esc(game.moves[idx])+'</span></div>';
      }
      colsHtml+='<div class="col'+(cell?' has':'')+'">'+cell+'</div>';
    }

    var sub=[];
    if(game.date)  sub.push('<span>'+esc(game.date)+'</span>');
    if(game.result)sub.push('<span>'+esc(game.result)+'</span>');
    var titleText=(game.title||"").trim();
    var isLong=titleText.length>6;
    var head='<div class="kdo-title"><h3 class="'+(isLong?'long':'')+'">'+
          esc(titleText||"棋譜")+'</h3><div class="tline"></div></div>'+
      '<div class="players">'+
        '<span class="p"><em>先手</em>'+esc(game.sente||"　　　　")+'</span>'+
        '<span class="vs">▲△</span>'+
        '<span class="p"><em>後手</em>'+esc(game.gote ||"　　　　")+'</span>'+
      '</div>'+
      (sub.length?'<div class="subinfo">'+sub.join('<span>|</span>')+'</div>':'<div style="margin-bottom:5mm"></div>');

    renderStage.innerHTML=
      '<div class="sheet" style="--mv:'+fs.toFixed(2)+'pt"><div class="frame">'+head+
      '<div class="cols">'+colsHtml+'</div></div>'+
      LOGO+'</div>';
    scheduleCapture();
  }

  /* ---------- 自動で画像化（編集が落ち着いてから） ---------- */
  var captureTimer=null, capturing=false, capturePending=false, captureSeq=0;

  function scheduleCapture(){
    setNote("A4棋譜を作成中…","busy");
    if(captureTimer){ clearTimeout(captureTimer); }
    captureTimer=setTimeout(captureSheets, 700);
  }

  async function captureSheets(){
    if(capturing){ capturePending=true; return; }
    capturing=true;
    var mySeq=++captureSeq;
    try{
      if(document.fonts && document.fonts.ready){ await document.fonts.ready; }
      var sheetEls=renderStage.querySelectorAll(".sheet");
      var urls=[];
      for(var i=0;i<sheetEls.length;i++){
        var canvas=await html2canvas(sheetEls[i],{
          scale:2, backgroundColor:"#ffffff", useCORS:true, logging:false
        });
        urls.push(canvas.toDataURL("image/png"));
      }
      if(mySeq===captureSeq){ // 最新の編集内容のときだけ表示
        imgPreview.innerHTML="";
        urls.forEach(function(src,i){
          var cap=document.createElement("p");
          cap.className="pcap";
          cap.textContent=(i+1)+" / "+urls.length+" ページ";
          var img=document.createElement("img");
          img.src=src;
          img.alt="A4棋譜 "+(i+1)+"ページ目（長押しで保存できます）";
          imgPreview.appendChild(cap);
          imgPreview.appendChild(img);
        });
        setNote("できました。棋譜を長押しして保存できます。","ok");
      }
    }catch(err){
      console.error(err);
      setNote("棋譜の画像化に失敗しました："+err.message,"err");
    }finally{
      capturing=false;
      if(capturePending){ capturePending=false; captureSheets(); }
    }
  }

})();
</script>

  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(err){
        console.log("SW登録失敗:", err);
      });
    });
  }
</script>
